<!--
╔══════════════════════════════════════════════════════════╗
║  404 PAGE - Not Found                                   ║
║                                                         ║
║  This is shown when someone visits a URL that doesn't   ║
║  match any route. It's a good example of error          ║
║  handling in Flask.                                     ║
╚══════════════════════════════════════════════════════════╝
-->
{% extends "base.html" %}
{% block title %}Page Not Found - RAG Academy{% endblock %}
{% block content %}
<div class="clay-container clay-text-center clay-mt-xl clay-mb-xl">
    <p class="clay-stat">🔍</p>
    <h1>404 — Page Not Found</h1>
    <p class="clay-text-muted">
        This URL doesn't match any route in Flask.
        <br>In app.py, there's no <code>@app.route()</code> for this path.
    </p>
    <a href="{{ url_for('home') }}" class="clay-btn clay-btn--primary clay-btn--lg clay-mt-lg">
        ← Back to Home
    </a>
</div>
{% endblock %}

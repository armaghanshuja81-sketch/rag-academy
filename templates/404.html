<!--
╔══════════════════════════════════════════════════════════╗
║  404 PAGE - Not Found                                   ║
║                                                         ║
║  This is shown when someone visits a URL that doesn't   ║
║  match any route. It's a good example of error          ║
║  handling in Flask.                                     ║
╚══════════════════════════════════════════════════════════╝
-->
{% extends "base.html" %}
{% block title %}Page Not Found - RAG Academy{% endblock %}
{% block content %}
<div class="container text-center" style="padding: 4rem 2rem;">
    <div style="font-size: 6rem; margin-bottom: 1rem;">🔍</div>
    <h1>404 — Page Not Found</h1>
    <p class="text-muted" style="font-size: 1.2rem;">
        This URL doesn't match any route in Flask.
        <br>In app.py, there's no <code>@app.route()</code> for this path.
    </p>
    <a href="{{ url_for('home') }}" class="btn btn-primary btn-lg" style="margin-top: 1rem;">
        ← Back to Home
    </a>
</div>
{% endblock %}

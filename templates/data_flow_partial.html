<div class="clay-container">
    <div class="clay-card clay-card--success clay-mt-md">
        <h3>📋 Data Flow Trace — Full Path</h3>
        <p class="clay-text-muted">Your data traveled through every layer of the stack:</p>
        {% for t in trace %}
        <div class="clay-card clay-card--accent clay-mb-sm">
            <strong>{{ t.icon }} {{ t.title }}</strong>
            <pre class="clay-text-xs clay-mt-sm"><code>{{ t.code }}</code></pre>
        </div>
        {% endfor %}
        <p><a href="{{ url_for('database_viewer') }}" class="clay-btn clay-btn--primary clay-btn--sm">🗄️ Check Database</a></p>
    </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<div class="container">
    <div class="card mt-2" style="border-color: var(--success);">
        <h3>📋 Data Flow Trace — Full Path</h3>
        <p class="text-muted">Your data traveled through every layer of the stack:</p>
        {% for t in trace %}
        <div class="card" style="margin-bottom: 0.5rem; border-left: 4px solid {{ t.color }};">
            <strong>{{ t.icon }} {{ t.title }}</strong>
            <pre style="font-size: 0.8rem; margin-top: 0.25rem; padding: 0.5rem; background: #f8f8f8; color: #333;">{{ t.code }}</pre>
        </div>
        {% endfor %}
        <p><a href="{{ url_for('database_viewer') }}" class="btn btn-sm btn-primary">🗄️ Check Database</a></p>
    </div>
</div>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

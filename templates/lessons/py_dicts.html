<h2>Dictionaries &amp; Sets</h2><p>Dictionaries store key-value pairs.</p><pre><code>student = {"name": "Armaghan", "age": 20}
print(student["name"])   # Armaghan
student["email"] = "a@b.com"  # Add key
for k, v in student.items():
    print(f"{k}: {v}")</code></pre><p>Sets store unique items: <code>tags = {"python", "rag", "flask"}</code></p>
